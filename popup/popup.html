<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Snapshot</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #111;
    }

    .header {
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .action-button {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3B82F6;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .action-button:hover {
      background: #2563EB;
    }

    .action-button:active {
      background: #1D4ED8;
    }

    .shortcut {
      margin-top: 10px;
      font-size: 12px;
      color: #6B7280;
      text-align: center;
    }

    .shortcut kbd {
      font-family: inherit;
      font-size: 11px;
      color: #6B7280;
      background: #F3F4F6;
      border: 1px solid #E5E7EB;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .features {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #E5E7EB;
      font-size: 12px;
      color: #6B7280;
      line-height: 1.7;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1A1A1A;
        color: #E5E5E5;
      }

      .header h1 {
        color: #E5E5E5;
      }

      .shortcut {
        color: #9CA3AF;
      }

      .shortcut kbd {
        color: #9CA3AF;
        background: #2A2A2A;
        border-color: #333;
      }

      .features {
        border-top-color: #333;
        color: #9CA3AF;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chrome Snapshot</h1>
  </div>

  <button id="takeScreenshot" class="action-button">Take Screenshot</button>

  <div class="shortcut">
    <kbd id="shortcutKey">Ctrl+Shift+S</kbd>
  </div>

  <div class="features">
    Area selection with guides<br>
    Highlight tool with color picker<br>
    Save as PNG or copy to clipboard
  </div>

  <script src="popup.js"></script>
</body>
</html>
